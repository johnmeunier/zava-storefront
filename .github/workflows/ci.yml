name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  apm-audit:
    name: APM audit (required)
    uses: DevExpGbb/zava-agent-config/.github/workflows/apm-audit.yml@main
    with:
      policy-path: ./apm-policy.yaml

  build:
    name: Build & test
    runs-on: ubuntu-latest
    needs: apm-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
