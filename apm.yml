name: zava-storefront
version: 0.1.0
description: >-
  Zava's customer-facing storefront. Next.js (App Router) + Postgres,
  deployed to Azure. Pins zava-agent-config for shared skills, instructions,
  personas, and the apm-audit CI gate.
author: Zava Engineering
license: UNLICENSED
keywords:
  - zava
  - storefront
  - nextjs
  - demo

dependencies:
  apm:
    # Upgraded to v2.0.0 marketplace — pin only the kits storefront actually needs.
    # ideate-kit (meeting-to-issue) lives upstream of this repo (PM tooling), so we
    # skip it. Every other kit applies: secure-baseline always, code-kit for PRs,
    # ship-kit for our CI/CD pipelines, operate-kit for SRE Agent → remediation PRs.
    - DevExpGbb/zava-agent-config/plugins/secure-baseline#v3.0.0
    - DevExpGbb/zava-agent-config/plugins/code-kit#v3.0.0
    - DevExpGbb/zava-agent-config/plugins/release-kit#v3.0.0
    - DevExpGbb/zava-agent-config/plugins/operate-kit#v3.0.0
  mcp: []

includes: auto

compilation:
  source_attribution: true
