name: "Zava Storefront APM Policy"
version: "1.0.0"
description: >-
  Storefront-specific overlay on top of the inherited zava-agent-config
  policy. Block-mode in CI; warn-mode locally.

extends: "DevExpGbb/zava-agent-config:apm-policy.yaml"
enforcement: block

# Storefront-specific additions on top of the inherited allowlists.
dependencies:
  allow:
    - "DevExpGbb/zava-agent-config"
    - "vercel/next-*"            # Next.js plugins from Vercel only

require_pinned: true
require_lockfile: true
